# Voronicon Macros - Serial: v2.3814

[delayed_gcode lights_idle]
initial_duration: 0.1
gcode:
  STATUS_READY
    
[delayed_gcode clear_message]
gcode:
    M117
    
[delayed_gcode printer_ready]
initial_duration: 1
gcode:
  WLED_ON STRIP=Lights PRESET=2
  _sb_status_ready
  BRIGHTS_OFF

[delayed_gcode present_model]
gcode:
  LIGHTS_ON
  _sb_status_complete
  UPDATE_DELAYED_GCODE ID=printer_ready DURATION=900
  
[gcode_macro PRINT_START]
gcode:
    # Parameters
    {% set bedtemp = params.BED|int %}
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set hotendtemp = params.HOTEND|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(195)|float %}
    {% set S_EXTRUDER_TEMP = 150|float %}
    {% set initial_tool = params.TOOL|default("0")|int %}

    {% if bedtemp >= 100 %}
        SET_FAN_SPEED FAN=Nevermore SPEED=1
    {% endif %}
    
    logo_bed
    STATUS_READY
    UPDATE_DELAYED_GCODE ID=clear_message DURATION=30
    _STATUS_HEATING
    M104 S150
    M190 S{bedtemp}        ; set & wait for bed temp
    _STATUS_HOMING
    SET_GCODE_OFFSET Z=0 ; Reset Z offset
    G28
    G90 
    _STATUS_LEVELING
    QUAD_GANTRY_LEVEL
    CARTOGRAPHER_TOUCH_HOME                          ; final z homing
    BED_MESH_CLEAR
    _STATUS_MESHING
    BED_MESH_CALIBRATE
    # CARTOGRAPHER_TOUCH
    _STATUS_PRINTING
    M109 S{hotendtemp}        ; set & wait for hotend temp
    T{initial_tool}        #Load Initial Tool

[gcode_macro _BRUSH]
gcode:
# parameters
    # {% set hotendtemp = params.HOTEND|int %}
# commands
    _STATUS_CLEANING
    CLEAN_NOZZLE


[gcode_macro PRINT_END]
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 20, th.axis_maximum.z]|min %}
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10 F800                    ;retract filament from meltzone
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 40} F3600  ; park nozzle at rear
    TURN_OFF_HEATERS
    M107                                     ; turn off fan
    BED_MESH_CLEAR
    SET_FAN_SPEED FAN=Nevermore SPEED=0
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    _STATUS_COMPLETE
    UPDATE_DELAYED_GCODE ID=present_model DURATION=300
    M117 Print Complete!!!
    UPDATE_DELAYED_GCODE ID=clear_message DURATION=60

[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90
    _STATUS_HOMING
    G28
    _STATUS_LEVELING
    QUAD_GANTRY_LEVEL
    _STATUS_HOMING
    CARTOGRAPHER_TOUCH_HOME ; Home for real Z0
    ##  Uncomment for for your size printer:
    #--------------------------------------------------------------------
    G0 X175 Y175 Z30 F3600
    #--------------------------------------------------------------------
    STATUS_READY
    RESTORE_GCODE_STATE NAME=STATE_G32

[gcode_macro Carto_Touch_Home]
gcode: 
    CARTOGRAPHER_TOUCH_HOME
    
