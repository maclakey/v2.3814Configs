[mcu cartographer]
canbus_uuid=3f421c79fc45
#serial: /dev/serial/by-id/usb-cartographer_cartographer_
#    adjust to suit your scanner, if using usb change to serial

[cartographer]
mcu: cartographer            #   Offsets are measured from the centre of your coil, to the tip of your nozzle on a level axis. It is vital that this is accurate.
x_offset: 0             #   Adjust for your cartographers offset from nozzle to middle of coil
y_offset: 21.1        #   Adjust for your cartographers offset from nozzle to middle of coil
verbose: no # For extra output
# backlash_comp: -0.00452 #   Backlash compensation distance for removing Z backlash before measuring the sensor response.
# sensor: cartographer    #   This must be set as cartographer unless using IDM etc.
# sensor_alt: carto       #   Alternate name to call commands. CARTO_TOUCH etc      
# mesh_runs: 2            #   Number of passes to make during mesh scan.

[bed_mesh]
zero_reference_position: 175, 175    #    set this to the middle of your bed
speed: 300                           #    movement speed of toolhead during bed mesh
horizontal_move_z: 5                 #    height of scanner during bed mesh scan
mesh_min: 20, 35                     #    start point of bed mesh [X, Y]
mesh_max: 310, 310                   #    end point of bed mesh [X, Y]
probe_count: 30, 30
algorithm: bicubic
adaptive_margin: 10
mesh_pps: 0,0                        # Disable interpolation - mesh is probably dense enough

[temperature_sensor Cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345]
cs_pin: cartographer:PA0
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
   175, 175, 20

[axis_twist_compensation]