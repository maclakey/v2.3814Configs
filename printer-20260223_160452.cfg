# max_temp: 100

[temperature_sensor Octopus]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor et0_mcu]
sensor_type: temperature_mcu
sensor_mcu: et0
min_temp: 0
max_temp: 100

