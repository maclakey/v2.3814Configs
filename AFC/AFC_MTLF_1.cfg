[include mcu/MTLF_MMB_1.0.cfg]

[mcu MTLF_1]
canbus_uuid: 9d34eb022fc0
#serial: <replace with your /dev/serial/by-id/...> and comment out canbus_uuid above

[AFC_BoxTurtle MTLF_1]
hub: MTLF_1
extruder: extruder
enable_assist: True        # Setting to True enables espooler assist while printing
enable_kick_start: True    # Setting to True enables full speed espoolers for kick_start_time(0.070 ms default) amount
# buffer: TN                 # If not defined below from the install script, uncomment and add buffer name if using a buffer

[AFC_stepper lane1]
unit: MTLF_1:1
step_pin: MTLF_1:M1_STEP
dir_pin: MTLF_1:M1_DIR
enable_pin: !MTLF_1:M1_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 1135.0 
park_dist: 10
led_index: AFC_Indicator:1
# afc_motor_rwd: MTLF_1:MOT1_RWD
# afc_motor_fwd: MTLF_1:MOT1_FWD
# afc_motor_enb: MTLF_1:MOT1_EN
# rwd_speed_multiplier: 0.5
# fwd_speed_multiplier: 0.5
# pwm: True
# hardware_pwm: True
prep: ^MTLF_1:TRG1
load: ^MTLF_1:EXT1

[tmc2209 AFC_stepper lane1]
uart_pin: MTLF_1:M1_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane2]
unit: MTLF_1:2
step_pin: MTLF_1:M2_STEP
dir_pin: MTLF_1:M2_DIR
enable_pin: !MTLF_1:M2_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 1115.0 
park_dist: 10
led_index: AFC_Indicator:2
# afc_motor_rwd: MTLF_1:MOT2_RWD
# afc_motor_fwd: MTLF_1:MOT2_FWD
# afc_motor_enb: MTLF_1:MOT2_EN
# rwd_speed_multiplier: 0.5
# fwd_speed_multiplier: 0.5
# pwm: True
# hardware_pwm: True
prep: ^MTLF_1:TRG2
load: ^MTLF_1:EXT2

[tmc2209 AFC_stepper lane2]
uart_pin: MTLF_1:M2_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane3]
