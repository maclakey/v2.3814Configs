[AFC_hub MTLF_1]
# switch_pin: ^et0:gpio22      # Pin for the hub switch
switch_pin: HUB             # PG12 on Octopus
afc_bowden_length: 110.0    # Length of the Bowden tube from the hub to the toolhead sensor in mm.
move_dis: 50                # Distance to move the filament within the hub in mm.
#hub_clear_move_dis: 50     # Distance after hub switch becomes fast to retract to insure hub is clear
cut: False                  # Hub cutter installed (e.g. Snappy)

#--=================================================================================--#
######### Hub Cut #####################################################################
#--=================================================================================--#
assisted_retract: False     # If True, retracts are assisted to prevent loose windows on the spool
cut_cmd: AFC #CMD to use
cut_dist: 50                # How much filament to cut off (in mm).
cut_clear: 120              # How far the filament should retract back from the hub (in mm).
cut_min_length: 300.0
cut_servo_pass_angle: 10    # Servo angle to align the Bowden tube with the hole for loading the toolhead.
cut_servo_clip_angle: 180   # Servo angle for cutting the filament.
cut_servo_prep_angle: 80    # Servo angle to prepare the filament for cutting (aligning the exit hole).

#[AFC_screen MTLF_1]
#mac_address: None

# [temperature_sensor MTLF_1]
# sensor_type: temperature_mcu
# sensor_mcu: MTLF_1

[temperature_fan MTLF_fan]
pin: MTLF_1:FAN
shutdown_speed: 0.0
max_power: 1.0                
kick_start_time: 0.5
sensor_type: temperature_mcu
sensor_mcu: MTLF_1
min_temp: 0
max_temp: 100
target_temp: 40               # The temp the fan will try to maintain
control: pid
pid_Kp: 2.0                   # Proportional gain
pid_Ki: 5.0                   # Integral gain
pid_Kd: 0.5                   # Derivative gain
pid_deriv_time: 2.0
min_speed: 0.0          # Allows the fan to go all the way to 0%
off_below: 0.10         # Tells Klipper to just cut power if the speed drops below 10%

[AFC_led AFC_Indicator]
pin: MTLF_1:RGB1
chain_count: 4
color_order: GRB

