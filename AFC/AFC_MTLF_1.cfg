step_pin: MTLF_1:M3_STEP
dir_pin: MTLF_1:M3_DIR
enable_pin: !MTLF_1:M3_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 1130.0 
park_dist: 10
led_index: AFC_Indicator:3
# afc_motor_rwd: MTLF_1:MOT3_RWD
# afc_motor_fwd: MTLF_1:MOT3_FWD
# afc_motor_enb: MTLF_1:MOT3_EN
