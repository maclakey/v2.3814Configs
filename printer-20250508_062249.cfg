#####################################################################
#   Fan Control
#####################################################################

[fan]
##  Part Cooling Fan - FAN0
pin: et0:gpio24
kick_start_time: 1.5
off_below: 0.0
#cycle_time: 0.010

[heater_fan hotend_fan]
pin: et0:gpio19
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0
fan_speed: .75

[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PD12
kick_start_time: 0.5
heater: heater_bed
fan_speed: .20
max_power: 1

[fan_generic Nevermore]
## Nevemore Fan - FAN4
pin: PD14
kick_start_time: 0.5
max_power: 1.0

[controller_fan CAN_Fan]
pin: et0:gpio21
kick_start_time: 0.5
heater: heater_bed
fan_speed: 0.75
max_power: 1

[temperature_fan Pi_fan]
pin: PE5
shutdown_speed: 0
max_power: .5
kick_start_time: 0.5
control: watermark
max_delta: 5
sensor_type: temperature_host
min_temp: 0
max_temp: 90
target_temp: 20

