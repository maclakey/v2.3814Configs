## SB2040-pro v3  https://mellow.klipper.cn/#/board/fly_sb2040/cfg
[mcu et2]
canbus_uuid: ea1154b681f2

[temperature_sensor e2_mcu]
sensor_type: temperature_mcu
sensor_mcu: et2
min_temp: 0
max_temp: 100

[extruder2]
step_pin: et2:gpio14
dir_pin: !et2:gpio13
enable_pin: !et2:gpio16
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 22.7092194
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et2:gpio23
sensor_pin: et2:gpio27
control: pid
pid_kp: 48.849
pid_ki: 9.304
pid_kd: 64.117
step_pulse_duration: 0.000004
sensor_type: ATC Semitec 104NT-4-R025H42G
# pullup_resistor: 990
min_temp:  -10
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.035                                               # See tuning pressure advance doc
#pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 100.0
max_extrude_cross_section: 5

[tmc2209 extruder2]
uart_pin: et2:gpio15
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 03

[heater_fan T2_hotend_fan]
pin: et2:gpio19
heater: extruder2
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0
fan_speed: .75

[multi_fan T2_partfan]
pin: et2:gpio24
kick_start_time: 1.5
off_below: 0.0
#cycle_time: 0.010

[controller_fan CAN_Fan_T2]
pin: et2:gpio21
kick_start_time: 1
heater: heater_bed
fan_speed: 0.75
max_power: 1

#####################################################################
#      Accelerometer
#####################################################################
## https://www.klipper3d.org/Measuring_Resonances.html?h=adxl#adxl345
[lis2dw]
cs_pin: et2:gpio12
spi_software_sclk_pin: et2:gpio2
spi_software_mosi_pin: et2:gpio3
spi_software_miso_pin: et2:gpio4
# axes_map: z, y, x

[gcode_macro T2]
variable_color: ""
gcode:
    {% if not printer.toolhead.homed_axes == "xyz" %}
        G28
    {% endif %}
  SELECT_TOOL T=2

[tool T2]
tool_number: 2
extruder: extruder2
fan: multi_fan T2_partfan
#Tool offset is 0.650000,0.837500
gcode_x_offset: 0.65
gcode_y_offset: 0.84
gcode_z_offset: 0.60
#Tool Park X:176.750 Y:3.000 Z:285.900
params_park_x: 176.75
params_park_y: 3.0
params_park_z: 286.0
# input_shaper: 11/9/2024
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 23
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 23
 
[tool_probe T2]
pin: et2:gpio18
tool: 2
z_offset: 1.05
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.01
samples_tolerance_retries: 5
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder

## RGB
[neopixel et2_neopixel]
pin: et2:gpio26
chain_count: 10
color_order: GRB,GRB,GRB,GRB,GRB,GRB,GRB,GRB,GRBW,GRBW
initial_RED: 0.1
initial_GREEN: 0.0
initial_BLUE: 0.1
initial_WHITE: 0.0
