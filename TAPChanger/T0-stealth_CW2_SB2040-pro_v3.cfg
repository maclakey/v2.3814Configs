## SB2040-pro v3 https://mellow.klipper.cn/#/board/fly_sb2040/cfg
[mcu et0]
canbus_uuid: 1bf5e3b9477b

[temperature_sensor e0_mcu]
sensor_type: temperature_mcu
sensor_mcu: et0
min_temp: 0
max_temp: 100

[extruder]
step_pin: et0:gpio14
dir_pin: !et0:gpio13
enable_pin: !et0:gpio16
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 21.627828
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et0:gpio23
sensor_pin: et0:gpio27
#control: pid
#pwm_cycle_time: 0.01
sensor_type: ATC Semitec 104NT-4-R025H42G
# pullup_resistor: 990
#pid_Kp=: 9.652
#pid_Ki: 1.638
#pid_Kd: 58.956
min_temp:  -10
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.035                                               # See tuning pressure advance doc
#pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 100.0
max_extrude_cross_section: 5

[tmc2209 extruder]
uart_pin: et0:gpio15
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 03

[heater_fan T0_hotend_fan]
pin: et0:gpio19
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0
fan_speed: .75

[multi_fan T0_partfan]
pin: et0:gpio24
kick_start_time: 1.5
off_below: 0.0
#cycle_time: 0.010

[controller_fan CAN_Fan_T0]
pin: et0:gpio21
kick_start_time: 0.5
heater: heater_bed
fan_speed: 0.75
max_power: 1

#####################################################################
#      Accelerometer
#####################################################################
## https://www.klipper3d.org/Measuring_Resonances.html?h=adxl#adxl345
[lis2dw]
cs_pin: et0:gpio12
spi_software_sclk_pin: et0:gpio2
spi_software_mosi_pin: et0:gpio3
spi_software_miso_pin: et0:gpio4
# axes_map: z, y, x

[gcode_macro T0]
variable_color: ""
gcode:
    {% if not printer.toolhead.homed_axes == "xyz" %}
        G28
    {% endif %}
  SELECT_TOOL T=0

[tool T0]
tool_number: 0
extruder: extruder
fan: multi_fan T0_partfan
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
#Park X:6.100 Y:3.000 Z:286.000 E:0.000
params_park_x: 6.1
params_park_y: 3.0
params_park_z: 286.5
# input_shaper: 11/5/2024
params_input_shaper_type_x: '2hump_ei'
params_input_shaper_freq_x: 39.0
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 27.4
 
[tool_probe T0]
pin: et0:gpio18
tool: 0
z_offset: -1.400
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.01
samples_tolerance_retries: 5
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder

## RGB
[neopixel et0_neopixel]
pin: et0:gpio26
chain_count: 10
color_order: GRB
initial_RED: 0.1
initial_GREEN: 0.0
initial_BLUE: 0.1
# initial_WHITE: 0.0
