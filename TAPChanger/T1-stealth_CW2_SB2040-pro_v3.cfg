## SB2040-pro v3 https://mellow.klipper.cn/#/board/fly_sb2040/cfg
[mcu et1]
canbus_uuid: 2c9e17cc108c

[temperature_sensor e1_mcu]
sensor_type: temperature_mcu
sensor_mcu: et1
min_temp: 0
max_temp: 100

[extruder1]
step_pin: et1:gpio14
dir_pin: !et1:gpio13
enable_pin: !et1:gpio16
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 22.8327909793
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et1:gpio23
sensor_pin: et1:gpio27
control: pid
pwm_cycle_time: 0.01
sensor_type: ATC Semitec 104NT-4-R025H42G
# pullup_resistor: 990
pid_Kp: 33.674
pid_Ki: 4.064
pid_Kd: 93.637
min_temp:  -10
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.035                                               # See tuning pressure advance doc
#pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 100.0
max_extrude_cross_section: 5

[tmc2209 extruder1]
uart_pin: et1:gpio15
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 03

[heater_fan T1_hotend_fan]
pin: et1:gpio19
heater: extruder1
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0
fan_speed: .75

[multi_fan T1_partfan]
pin: et1:gpio24
kick_start_time: 1.5
off_below: 0.0
#cycle_time: 0.010

[controller_fan CAN_Fan_T1]
pin: et1:gpio21
kick_start_time: 0.5
heater: heater_bed
fan_speed: 0.75
max_power: 1

#####################################################################
#      Accelerometer
#####################################################################
## https://www.klipper3d.org/Measuring_Resonances.html?h=adxl#adxl345
[lis2dw]
cs_pin: et1:gpio12
spi_software_sclk_pin: et1:gpio2
spi_software_mosi_pin: et1:gpio3
spi_software_miso_pin: et1:gpio4
# axes_map: z, y, x

[gcode_macro T1]
variable_color: ""
gcode:
    {% if not printer.toolhead.homed_axes == "xyz" %}
        G28
    {% endif %}
  SELECT_TOOL T=1

[tool T1]
tool_number: 1
extruder: extruder1
fan: multi_fan T1_partfan
#Tool offset is 0.753125,-0.453125
gcode_x_offset: 0.75
gcode_y_offset: -0.45
gcode_z_offset: -0.40
# Park: X:92.600 Y:4.500 Z:285.200
params_park_x: 92.6
params_park_y: 4.5
params_park_z: 285.2

# input_shaper 11/6/2024
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 56.2
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 35.6
 
[tool_probe T1]
pin: et1:gpio18
tool: 1
z_offset: 2.4
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.01
samples_tolerance_retries: 5
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder1

## RGB
[neopixel et1_neopixel]
pin: et1:gpio26
chain_count: 10
color_order: GRB
initial_RED: 0.1
initial_GREEN: 0.0
initial_BLUE: 0.1
# initial_WHITE: 0.0
