kick_start_time: 1.5
off_below: 0.0
#cycle_time: 0.010

[heater_fan hotend_fan]
pin: et0:gpio19
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0
fan_speed: .75

[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PD12
kick_start_time: 0.5
heater: heater_bed
fan_speed: .20
max_power: 1

[fan_generic Nevermore]
## Nevemore Fan - FAN4
pin: PD14
kick_start_time: 0.5
max_power: 1.0

[controller_fan CAN_Fan]
pin: et0:gpio21
kick_start_time: 0.5
heater: heater_bed
fan_speed: 0.75
max_power: 1

[temperature_fan Pi_fan]
