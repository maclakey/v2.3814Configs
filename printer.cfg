# This file contains common pin mappings for the BigTreeTech Octopus V1.
#test backup message
#####################################################################
#   Includes
#####################################################################

[include Client_Variable.cfg]
[include mainsail.cfg]

### SELECT TOOLHEAD BOARD FROM THE NEXT ENTRIES!!!

# [include SB2040v2.cfg]
[include SB2040v3.cfg]
# [include BTTsb2209.cfg]

### SELECT TOOLHEAD BOARD FROM THE ABOVE ENTRIES!!!

### UNCOMMENT next cartographer and scanner for eddy probe
[include cartographer.cfg]
[include scanner.cfg]

### COMMENT OUT TAP.cfg if using EDDY probe!
# [include TAP.cfg]

[include dance.cfg]
[include M600.cfg]
[include macros.cfg]
[include led_effect.cfg]
[include wled.cfg]
[include shell_command.cfg]
[include heat_soak.cfg]
[include sensorless.cfg]
[include KAMP_Settings.cfg]
[include config_backup.cfg]

[firmware_retraction]

[save_variables]
filename: ~/variables.cfg

[respond]
default_type: echo
default_prefix: 

[force_move]
enable_force_move: True

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 8000             #Max 4000
max_z_velocity: 20          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_3C003A001050534E4E313120-if00
restart_method: command
##--------------------------------------------------------------------
[mcu rpi]
serial: /tmp/klipper_host_mcu

[input_shaper]
#shaper_freq_x: 56.4
#shaper_type_x: mzv
#shaper_freq_y: 37.4
#shaper_type_y: mzv

[exclude_object]

    
#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to MOTOR_0
##  Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
#endstop_pin: !PG6  ## HAL Effect
endstop_pin: tmc2209_stepper_x:virtual_endstop  ## Sensorless
position_min: -3

##--------------------------------------------------------------------
position_endstop: 353.5
position_max: 353.5
##--------------------------------------------------------------------

homing_speed: 50   #Max 100
homing_retract_dist: 0
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG6           # use the same pin that was previously the endstop_pin!
driver_SGTHRS: 93        # 255 is most sensitive value, 0 is least sensitive

##  A Stepper - Right
##  Connected to MOTOR_1
##  Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
#endstop_pin: !PG9  ## HAL Effect
endstop_pin: tmc2209_stepper_y:virtual_endstop  ## Sensorless
position_min: -10

##--------------------------------------------------------------------
position_endstop: 360
position_max: 360
##--------------------------------------------------------------------

homing_speed: 50  #Max 100
homing_retract_dist: 0
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG9         # use the same pin that was previously the endstop_pin!
driver_SGTHRS: 120     # 255 is most sensitive value, 0 is least sensitive

#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to MOTOR_2
##  Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0

##--------------------------------------------------------------------
position_max: 355
##--------------------------------------------------------------------

position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 Stepper - Rear Left
##  Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Rear Right
##  Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z3 Stepper - Front Right
##  Connected to MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Extruder
#####################################################################

[extruder]
# step_pin: et0: ### See SB2040v2.cfg or SB2040v3.cfg
# dir_pin: et0:
# enable_pin: et0:
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 21.627828
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
# heater_pin: et0: ### See SB2040v2.cfg or SB2040v3.cfg
# sensor_pin: et0: ### See SB2040v2.cfg or SB2040v3.cfg
# control: pid
#pwm_cycle_time: 0.01
sensor_type: ATC Semitec 104NT-4-R025H42G
# pullup_resistor: 990
# pid_Kp=: 26.213
# pid_Ki: 1.304
# pid_Kd: 131.721
min_temp:  -10
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.035                                               # See tuning pressure advance doc
#pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 400.0
max_extrude_cross_section: 50

# control = pid
# pid_kp = 26.213
# pid_ki = 1.304
# pid_kd = 131.721

##  Try to keep pressure_advance below 1.0
pressure_advance: 0.035
##  Default is 0.040, leave stock
#pressure_advance_smooth_time: 0.040

[tmc2240 extruder]
# uart_pin: ### SEE SB2040v2.CFG OR SB2040v3.CFG
interpolate: false
run_current: 0.5
# sense_resistor: 0.110
stealthchop_threshold: 03


#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]

heater_pin: PA3
##  Validate the following thermistor type to make sure it is correct
##  See https://www.klipper3d.org/Config_Reference.html#common-thermistors for additional options
sensor_type: Generic 3950
sensor_pin: PF3
##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
max_power: 0.6
min_temp: 0
max_temp: 120
control: pid
pid_kp: 48.849
pid_ki: 9.304
pid_kd: 64.117

[verify_heater heater_bed]
max_error: 200
#   The maximum "cumulative temperature error" before raising an
#   error. Smaller values result in stricter checking and larger
#   values allow for more time before an error is reported.
#   Specifically, the temperature is inspected once a second and if it
#   is close to the target temperature then an internal "error
#   counter" is reset; otherwise, if the temperature is below the
#   target range then the counter is increased by the amount the
#   reported temperature differs from that range. Should the counter
#   exceed this "max_error" then an error is raised. The default is
#   120.
#check_gain_time:
#   This controls heater verification during initial heating. Smaller
#   values result in stricter checking and larger values allow for
#   more time before an error is reported. Specifically, during
#   initial heating, as long as the heater increases in temperature
#   within this time frame (specified in seconds) then the internal
#   "error counter" is reset. The default is 20 seconds for extruders
#   and 60 seconds for heater_bed.
#hysteresis: 5
#   The maximum temperature difference (in Celsius) to a target
#   temperature that is considered in range of the target. This
#   controls the max_error range check. It is rare to customize this
#   value. The default is 5.
#heating_gain: 2
#   The minimum temperature (in Celsius) that the heater must increase
#   by during the check_gain_time check. It is rare to customize this
#   value. The default is 2.

