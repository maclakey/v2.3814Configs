# pin: PD12
# kick_start_time: 0.5
# heater: heater_bed
# fan_speed: .20
# max_power: 1

[temperature_fan Octopus_fan]
pin: PD12
max_power: 0.3
shutdown_speed: 0.0
sensor_type: temperature_mcu
control: watermark
target_temp: 45.0
max_delta: 3.0
min_temp: 0
max_temp: 100

[fan_generic Nevermore]
## Nevemore Fan - FAN4
pin: PD14
kick_start_time: 0.5
max_power: 1.0

[temperature_fan Pi_fan]
pin: PE5
shutdown_speed: 0.0
max_power: 1.0
kick_start_time: 0.5
min_speed: 0.0
off_below: 0.10
sensor_type: temperature_host
min_temp: 0
max_temp: 90
target_temp: 50.0
control: pid
pid_Kp: 2.0
pid_Ki: 5.0
pid_Kd: 0.5

