[fan]
##  Part Cooling Fan
# pin: ### SEE SB2040v2.CFG OR SB2040v3.CFG
kick_start_time: 1.5
off_below: 0.0
#cycle_time: 0.010

[heater_fan hotend_fan]
# pin: ### SEE SB2040v2.CFG OR SB2040v3.CFG
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50.0
fan_speed: .75

# [controller_fan controller_fan]
