### TO UPDATE KLIPPER https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-sb2040/sb2040-pro-v3/flash/can
### SB2040 v3 PRO https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-sb2040/sb2040-v3/wiring/

[mcu et0]
canbus_uuid=c38b537d1828

# [lis2dw]
# cs_pin: et0:gpio12
# spi_software_sclk_pin: et0:gpio2
# spi_software_mosi_pin: et0:gpio3
# spi_software_miso_pin: et0:gpio4
# # axes_map: z, y, x

# [resonance_tester]
# accel_chip: lis2dw
# probe_points:
#     175, 175, 20  # an example

[neopixel et0_neopixel]
pin: et0:gpio26
chain_count: 10
color_order: GRB
initial_RED: 0.1
initial_GREEN: 0.0
initial_BLUE: 0.1
# initial_WHITE: 0.0

[extruder]
step_pin: et0:gpio14
dir_pin: !et0:gpio13
enable_pin: !et0:gpio16

heater_pin: et0:gpio23
sensor_pin: et0:gpio27

[tmc2240 extruder]
uart_pin: et0:gpio15

[fan] ### Part Cooling Fan
pin: et0:gpio24

[heater_fan hotend_fan]
pin: et0:gpio19

[temperature_fan CAN_fan]
pin: et0:gpio21
shutdown_speed: 0.0
kick_start_time: 0.5
sensor_type: temperature_mcu
sensor_mcu: et0               # This targets your RP2040 toolhead sensor
control: watermark            # Using watermark for simplicity on the toolhead
target_temp: 50.0             # Fan stays off until the toolhead hits 50C
max_delta: 3.0
min_temp: 0
max_temp: 100

